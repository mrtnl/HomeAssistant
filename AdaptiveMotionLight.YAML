blueprint:
  name: Motion + illuminance band light (brightness inverse, color temp mapped)
  description: >
    Turns on a light when motion is detected AND illuminance is within a lux band.
    Brightness is mapped inversely to the lux band.
    Color temperature is mapped to the lux band.
  domain: automation

  input:
    target_light:
      name: Light
      selector:
        entity:
          domain: light

    motion_sensor:
      name: Motion sensor
      selector:
        entity:
          domain: binary_sensor
          device_class: motion

    illuminance_sensor:
      name: Illuminance sensor
      selector:
        entity:
          domain: sensor
          device_class: illuminance

    lux_low:
      name: Lux low
      default: 10
      selector:
        number:
          min: 0
          max: 20000

    lux_high:
      name: Lux high
      default: 200
      selector:
        number:
          min: 1
          max: 20000

    brightness_min_pct:
      name: Min brightness (% at high lux)
      default: 10
      selector:
        number:
          min: 1
          max: 100

    brightness_max_pct:
      name: Max brightness (% at low lux)
      default: 100
      selector:
        number:
          min: 1
          max: 100

    ct_cool_mired:
      name: Cool CT (high lux)
      default: 153
      selector:
        number:
          min: 100
          max: 500

    ct_warm_mired:
      name: Warm CT (low lux)
      default: 370
      selector:
        number:
          min: 100
          max: 500

    turn_off:
      name: Turn off when no motion
      default: true
      selector:
        boolean:

    off_delay_seconds:
      name: No-motion off delay (seconds)
      default: 120
      selector:
        number:
          min: 0
          max: 86400

    on_duration_seconds:
      name: Fixed on duration (seconds, 0 = disabled)
      default: 0
      selector:
        number:
          min: 0
          max: 86400

mode: restart

trigger:
  - platform: state
    entity_id: !input motion_sensor
    to: "on"

variables:
  light_entity: !input target_light
  lux_entity: !input illuminance_sensor
  lux_low_v: !input lux_low
  lux_high_v: !input lux_high
  bri_min: !input brightness_min_pct
  bri_max: !input brightness_max_pct
  ct_cool: !input ct_cool_mired
  ct_warm: !input ct_warm_mired
  on_duration: !input on_duration_seconds

action:
  - variables:
      lux: "{{ states(lux_entity) | float(0) }}"
      low: "{{ [lux_low_v, lux_high_v] | min }}"
      high: "{{ [lux_low_v, lux_high_v] | max }}"
      ratio: >-
        {% set span = high - low %}
        {{ 0 if span <= 0 else [0, [1, (lux - low) / span] | min] | max }}
      brightness_255: >-
        {{ ((bri_max - ratio * (bri_max - bri_min)) * 2.55) | round | int }}
      color_temp_mired: >-
        {{ (ct_warm - ratio * (ct_warm - ct_cool)) | round | int }}

  - condition: numeric_state
    entity_id: !input illuminance_sensor
    above: !input lux_low
    below: !input lux_high

  - service: light.turn_on
    target:
      entity_id: !input target_light
    data:
      brightness: "{{ brightness_255 }}"
      color_temp: "{{ color_temp_mired }}"

  # fixed duration off
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ on_duration | int > 0 }}"
        sequence:
          - delay:
              seconds: "{{ on_duration }}"
          - service: light.turn_off
            target:
              entity_id: !input target_light

      # motion-based off fallback
      - conditions:
          - condition: template
            value_template: "{{ on_duration | int == 0 and ( !input turn_off ) }}"
        sequence:
          - wait_for_trigger:
              - platform: state
                entity_id: !input motion_sensor
                to: "off"
          - delay:
              seconds: !input off_delay_seconds
          - condition: state
            entity_id: !input motion_sensor
            state: "off"
          - service: light.turn_off
            target:
              entity_id: !input target_light
